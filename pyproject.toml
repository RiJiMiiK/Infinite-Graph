[tool.black]
line-length = 100
target-version = ["py313"]

[tool.isort]
profile = "black"
line_length = 100

[tool.pylint.main]
ignore = ["__pycache__"]
extension-pkg-allow-list = ["PySide6", "pyqtgraph", "numpy"]

[tool.pylint.format]
max-line-length = 100

[tool.pylint.design]
max-args = 7
max-positional-arguments = 7
max-locals = 30
max-branches = 20
max-statements = 80
max-attributes = 30

[tool.pylint.messages_control]
disable = [
  "missing-module-docstring",
  "missing-function-docstring",
  "missing-class-docstring",
  "too-few-public-methods",
  "invalid-name",
  "broad-exception-caught",
  "no-member"
]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.coverage.run]
source = ["main", "src"]

[tool.coverage.report]
fail_under = 100
show_missing = true
